<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QDS Test App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        button {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        h1 { font-size: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>გამარჯობა, <span id="user-name">სტუმარო</span>! 👋</h1>
    <p>ეს არის შენი პირველი Telegram Mini App</p>
    <div id="user-id"></div>
    <button onclick="showAlert()">დააჭირე ვიბრაციისთვის</button>
    <button onclick="closeApp()" style="background: #e53935;">დახურვა</button>
</div>

<script>
    // ტელეგრამის აპლიკაციის ინიციალიზაცია
    const tg = window.Telegram.WebApp;
    tg.expand(); // აპლიკაცია იხსნება მთელ ეკრანზე

    // მომხმარებლის სახელის გამოჩენა
    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
        document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name;
        document.getElementById('user-id').innerText = "ID: " + tg.initDataUnsafe.user.id;
    }

    function showAlert() {
        tg.HapticFeedback.impactOccurred('heavy'); // ტელეფონის ვიბრაცია
        tg.showAlert("QDS სისტემა მუშაობს!");
    }

    function closeApp() {
        tg.close(); // აპლიკაციის დახურვა
    }
</script>

</body>
</html>
