<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QDS Order System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #007bff;
            --accent: #2ecc71;
            --bg: #ffffff;
            --input-fill: #f2f4f7;
            --text: #1c1c1e;
            --text-light: #8e8e93;
        }

        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding-top: env(safe-area-inset-top);
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            text-align: center;
            margin: 20px 0 40px;
        }

        .brand-icon {
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: white;
            font-size: 24px;
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(0, 123, 255, 0.15);
        }

        h1 { font-size: 22px; font-weight: 700; margin: 0; color: var(--text); }
        p.desc { font-size: 14px; color: var(--text-light); margin: 5px 0; }

        /* Form */
        .form-content { flex: 1; }
        .input-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            font-size: 12px; 
            font-weight: 700; 
            color: var(--primary); 
            text-transform: uppercase; 
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 16px;
            background: var(--input-fill);
            border: 1px solid transparent;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            color: var(--text);
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.1);
        }

        /* Fixed Button Wrapper */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            border-top: 1px solid #eee;
            padding: 15px 20px calc(15px + env(safe-area-inset-bottom));
            box-sizing: border-box;
            z-index: 100;
        }

        .btn-send {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0, 123, 255, 0.2);
        }

        .btn-send:active { transform: scale(0.98); opacity: 0.9; }

        /* Toast Message */
        #toast {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1c1c1e;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 14px;
            transition: top 0.4s;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #toast.active { top: 20px; }
    </style>
</head>
<body>

<div id="toast">✅ დაკოპირდა. გადავდივართ ჩატში...</div>

<div class="container">
    <div class="header">
        <div class="brand-icon">QDS</div>
        <h1>ახალი შეკვეთა</h1>
        <p class="desc">შეავსეთ მონაცემები სწრაფი მიწოდებისთვის</p>
    </div>

    <div class="form-content">
        <div class="input-group">
            <label>📦 რა იგზავნება?</label>
            <input type="text" id="item" placeholder="მაგ: ამანათი, საბუთები">
        </div>
        <div class="input-group">
            <label>📍 საიდან (მისამართი)</label>
            <input type="text" id="loc_from" placeholder="მაგ: ვაჟა-ფშაველას 7">
        </div>
        <div class="input-group">
            <label>🏁 სად (დანიშნულება)</label>
            <input type="text" id="loc_to" placeholder="მაგ: გლდანი, III მრ.">
        </div>
        <div class="input-group">
            <label>💰 ფასი (₾)</label>
            <input type="number" id="price" placeholder="მაგ: 15">
        </div>
        <div class="input-group">
            <label>📱 საკონტაქტო ნომერი</label>
            <input type="tel" id="phone" value="+995 ">
        </div>
        <div style="height: 100px;"></div> </div>

    <div class="bottom-nav">
        <button class="btn-send" onclick="sendOrder()">
            <i class="fab fa-telegram-plane"></i>
            გაგზავნა ჩატში
        </button>
    </div>
</div>

<script>
    function sendOrder() {
        const item = document.getElementById('item').value.trim();
        const from = document.getElementById('loc_from').value.trim();
        const to = document.getElementById('loc_to').value.trim();
        const price = document.getElementById('price').value.trim();
        const phone = document.getElementById('phone').value.trim();

        if(!item || !from || !to || !price) {
            alert("გთხოვთ შეავსოთ ყველა ველი!");
            return;
        }

        // გაუმჯობესებული ტელეგრამის შაბლონი
        const template = `
🆕 **#შეკვეთაQDS**

📦 **ნივთი:** \`${item}\`
───────────────
📍 **საიდან:** \`${from}\`
🏁 **სად:** \`${to}\`
───────────────
💰 **ფასი:** \`${price} ₾\`
📞 **კონტაქტი:** \`${phone}\`

_ნივთის ასაღებად მისწერეთ დამკვეთს პირადში._
`.trim();

        navigator.clipboard.writeText(template).then(() => {
            const toast = document.getElementById('toast');
            toast.classList.add('active');

            setTimeout(() => {
                window.location.href = "https://t.me/QDS_Tbilisi/158";
            }, 1200);
        });
    }
</script>

</body>
</html>
